<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb Redesign concept</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


<header class="navigation_bar">
    <div class="logo">
        <img src="idmb_logo_png" alt="Logo" width="80">
    </div>


    <div class="search_bar">
        <input type="text" id="movieSearch" placeholder="Search... ">


        <button id="searchButton" class="SearchBarButton">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </div>
 
    <div id="searchStatus">Awaiting input...</div>
</header>

<script src="script.js"></script>

<main>
    <section class="cinamaticContainer">
        <canvas id="cinamatic-canvas" class="cinamaticCanvas"></canvas>

        <div class="cinamaticOverlay">
            <div class="cinamaticContentWrapper">
                <div class="cinamaticText">
                <span class="imdbRating">★9.5</span>
                <h1>Superman</h1>
                <p>The new look of the worlds greatest hero.</p>
                <button class="btn_play">Watch Now</button>
            </div>

            <div class="cinamaticImage">
                <img src="superman.jpg" alt= "superman">
            </div>
        </div>
    </div>
</section>

        <section class="trendingNow">
            <h2 class ="sectionTitle">Trending Now</h2>
            <div class="movieGrid">
                <div class="movieCard">
                    <img src="avatar.jpg" alt ="poster">
                    <div class="cardInfo">
                        <p>★9.4</p>
                        <h3>Avatar: Fire and Ash</h3>
                    </div>
                </div>
                <div class="movieCard">
                    <img src="badboys.jpg" alt ="poster">
                    <div class="cardInfo">
                        <p>★8.2</p>
                        <h3>Bad Boys: Ride or Die</h3>
                    </div>
                </div>
                <div class="movieCard">
                    <img src="weapons.jpg" alt ="poster">
                    <div class="cardInfo">
                        <p>★9.1</p>
                        <h3>Weapons</h3>
                    </div>
                </div>
                <div class="movieCard">
                    <img src="chainsawman.jpg" alt ="poster">
                    <div class="cardInfo">
                        <p>★9.5</p>
                        <h3>Chainsaw man: Reze Arc</h3>
                    </div>
                </div>
            </div>
        </section>

        <section class ="celebSection"></section>





    </main>

    <div id="movieModal" class="modal">
        <div class="modalContent">
            <span class="closeModal">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>



    
</body>
</html>
